<!DOCTYPE html><html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="slide-id" content="this-all-looks-insanely-complex">
  <title id="this-all-looks-insanely-complex.title_tag">This all looks insanely complex</title>
  <base href="../">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="styles.css" rel="stylesheet">
  <script defer="" src="slide-runtime.js"></script>
</head>
<body>
  <div class="deck-shell">
    <div class="deck-scale" id="deckScale">
      <section class="slide grain active" data-slide-id="this-all-looks-insanely-complex">
        <div class="absolute inset-0 px-[96px] pt-[88px] pb-[88px] flex flex-col justify-start">
          <div class="note topbar">
            <span data-bind="text:topbar_left" id="this-all-looks-insanely-complex.topbar_left"></span>
            <span data-bind="text:topbar_center" id="this-all-looks-insanely-complex.topbar_center"></span>
            <span id="this-all-looks-insanely-complex.slide_counter">№<span data-bind="magic:slide_number" id="this-all-looks-insanely-complex.slide_number"></span> / <span data-bind="magic:slide_count" id="this-all-looks-insanely-complex.slide_count"></span></span>
          </div>
          <div class="h-[24px]"></div>
          <h1 class="h-lg max-w-[1200px]" id="this-all-looks-insanely-complex.title" data-bind="html:title"></h1>
          <div class="grid grid-cols-[0.9fr_1.1fr] gap-8 mt-12 mb-[140px] items-start">
            <div class="max-w-[980px]">
              <div class="panel rounded-[28px] p-8">
                <div class="eyebrow mb-5" id="this-all-looks-insanely-complex.left_panel_title" data-bind="text:left_panel_title"></div>
                <ul class="bullet-lg space-y-5">
                  <li id="this-all-looks-insanely-complex.item_1" data-bind="html:item_1"></li>
                  <li id="this-all-looks-insanely-complex.item_2" data-bind="html:item_2"></li>
                  <li id="this-all-looks-insanely-complex.item_3" data-bind="html:item_3"></li>
                  <li id="this-all-looks-insanely-complex.item_4" data-bind="html:item_4"></li>
                  <li id="this-all-looks-insanely-complex.item_5" data-bind="html:item_5"></li>
                  <li id="this-all-looks-insanely-complex.item_6" data-bind="html:item_6"></li>
                  <li id="this-all-looks-insanely-complex.item_7" data-bind="html:item_7"></li>
                </ul>
              </div>
            </div>
            <div class="relative h-[620px]">
              <video class="absolute left-[0px] top-[-40px] w-[470px]" id="this-all-looks-insanely-complex.video_1" autoplay="" muted="" loop="" playsinline="">
                <source src="assets/agent-demo-1.mp4" type="video/mp4">
              </video>
              <video class="absolute left-[210px] top-[130px] w-[470px]" id="this-all-looks-insanely-complex.video_2" autoplay="" muted="" loop="" playsinline="">
                <source src="assets/agent-demo-2.mp4" type="video/mp4">
              </video>
            </div>
          </div>
          <div class="footer-note" data-bind="text:footnote" id="this-all-looks-insanely-complex.footnote"></div>
        </div>
      </section>
    </div>
  </div>
  <script>
    function fit() {
      const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      document.getElementById('deckScale').style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', fit);
    fit();
  </script>



</body></html>
