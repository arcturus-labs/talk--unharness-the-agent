<!DOCTYPE html><html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="slide-id" content="agents-are-way-simpler-than-you-think">
  <title id="agents-are-way-simpler-than-you-think.title_tag">Agents are WAY simpler than you think</title>
  <base href="../">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="styles.css" rel="stylesheet">
  <script defer="" src="slide-runtime.js"></script>
</head>
<body>
  <div class="deck-shell">
    <div class="deck-scale" id="deckScale">
      <section class="slide grain active" data-slide-id="agents-are-way-simpler-than-you-think">
        <div class="absolute inset-0 px-[96px] py-[96px] flex flex-col justify-start">
          <div class="note topbar">
            <span data-bind="text:topbar_left" id="agents-are-way-simpler-than-you-think.topbar_left"></span>
            <span data-bind="text:topbar_center" id="agents-are-way-simpler-than-you-think.topbar_center"></span>
            <span id="agents-are-way-simpler-than-you-think.slide_counter">№<span data-bind="magic:slide_number" id="agents-are-way-simpler-than-you-think.slide_number"></span> / <span data-bind="magic:slide_count" id="agents-are-way-simpler-than-you-think.slide_count"></span></span>
          </div>
          <div class="flex-1 flex flex-col justify-between pt-[120px] pb-[120px]" id="agents-are-way-simpler-than-you-think.title">
            <div class="max-w-[1180px] self-start text-left">
              <div class="h-hero" id="agents-are-way-simpler-than-you-think.title_top" data-bind="html:title_top"></div>
            </div>
            <div class="max-w-[1180px] self-end text-right">
              <div class="h-hero" id="agents-are-way-simpler-than-you-think.title_bottom" data-bind="html:title_bottom"></div>
            </div>
          </div>
          <div class="footer-note" data-bind="text:footnote" id="agents-are-way-simpler-than-you-think.footnote"></div>
        </div>
      </section>
    </div>
  </div>
  <script>
    function fit() {
      const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      document.getElementById('deckScale').style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', fit);
    fit();
  </script>



</body></html>
