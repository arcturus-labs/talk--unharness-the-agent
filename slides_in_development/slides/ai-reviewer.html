<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="slide-id" content="ai-reviewer"><title id="ai-reviewer.title_tag">AI reviewer</title><base href="../"><script src="https://cdn.tailwindcss.com"></script><link href="styles.css" rel="stylesheet"><script defer="" src="slide-runtime.js"></script></head><body><div class="deck-shell"><div class="deck-scale" id="deckScale"><section class="slide grain active" data-slide-id="ai-reviewer"><div class="absolute inset-0 px-[96px] py-[92px] flex flex-col justify-start"><div class="note topbar"><span data-bind="text:topbar_left" id="ai-reviewer.topbar_left"></span><span data-bind="text:topbar_center" id="ai-reviewer.topbar_center"></span><span id="ai-reviewer.slide_counter">№<span data-bind="magic:slide_number" id="ai-reviewer.slide_number"></span> / <span data-bind="magic:slide_count" id="ai-reviewer.slide_count"></span></span></div><div class="h-[22px]"></div><div class="eyebrow" id="ai-reviewer.kicker" data-bind="text:kicker"></div><h1 class="h-lg max-w-[1700px] mt-4" id="ai-reviewer.title" data-bind="html:title"></h1><div class="grid grid-cols-[0.92fr_1.08fr] gap-8 mt-10 mb-[140px] items-start"><div class="panel rounded-[28px] p-10 min-h-[560px]"><div class="eyebrow mb-6" id="ai-reviewer.left_label" data-bind="text:left_label"></div><ul class="bullet-lg space-y-5 max-w-[92%]"><li id="ai-reviewer.bullet_1" data-bind="html:bullet_1"></li><li id="ai-reviewer.bullet_3" data-bind="html:bullet_3"></li><li id="ai-reviewer.bullet_4" data-bind="html:bullet_4"></li></ul></div><div class="panel rounded-[28px] p-10 min-h-[560px]"><div class="eyebrow mb-6" id="ai-reviewer.right_label" data-bind="text:right_label"></div><div class="body-md mono space-y-3"><div id="ai-reviewer.artifact_1" data-bind="html:artifact_1"></div><div id="ai-reviewer.artifact_2" data-bind="html:artifact_2"></div></div><div class="eyebrow mt-8 mb-3" id="ai-reviewer.command_labe
