<!DOCTYPE html><html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="slide-id" content="ecosystem-is-standardizing">
  <title id="ecosystem-is-standardizing.title_tag">The ecosystem is standardizing</title>
  <base href="../">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="styles.css" rel="stylesheet">
  <script defer="" src="slide-runtime.js"></script>
</head>
<body>
  <div class="deck-shell">
    <div class="deck-scale" id="deckScale">
      <section class="slide grain active" data-slide-id="ecosystem-is-standardizing">
        <div class="absolute inset-0 px-[96px] py-[88px] flex flex-col justify-start">
          <div class="note topbar">
            <span data-bind="text:topbar_left" id="ecosystem-is-standardizing.topbar_left"></span>
            <span data-bind="text:topbar_center" id="ecosystem-is-standardizing.topbar_center"></span>
            <span id="ecosystem-is-standardizing.slide_counter">№<span data-bind="magic:slide_number" id="ecosystem-is-standardizing.slide_number"></span> / <span data-bind="magic:slide_count" id="ecosystem-is-standardizing.slide_count"></span></span>
          </div>
          <div class="h-[18px]"></div>
          <h1 class="h-lg max-w-[1500px]" id="ecosystem-is-standardizing.title" data-bind="html:title"></h1>
          <div class="grid grid-cols-2 gap-8 mt-8 mb-[140px] items-start">
            <div class="panel rounded-[28px] p-8 min-h-[760px]" id="ecosystem-is-standardizing.left_panel">
              <div class="flex items-center justify-between mb-4">
                <div class="text-[64px] font-black tracking-[-.05em]" id="ecosystem-is-standardizing.left_label" data-bind="text:left_label"></div>
                <div class="chip" id="ecosystem-is-standardizing.left_chip" data-bind="text:left_chip"></div>
              </div>
              <div class="code panel rounded-[20px] p-5" id="ecosystem-is-standardizing.left_code" data-bind="text:left_code"></div>
            </div>
            <div class="panel rounded-[28px] p-8 min-h-[760px]" id="ecosystem-is-standardizing.right_panel">
              <div class="flex items-center justify-between mb-4">
                <div class="text-[64px] font-black tracking-[-.05em]" id="ecosystem-is-standardizing.right_label" data-bind="text:right_label"></div>
                <div class="chip" id="ecosystem-is-standardizing.right_chip" data-bind="text:right_chip"></div>
              </div>
              <div class="code panel rounded-[20px] p-5" id="ecosystem-is-standardizing.right_code" data-bind="text:right_code"></div>
            </div>
          </div>
          <div class="footer-note" data-bind="text:footnote" id="ecosystem-is-standardizing.footnote"></div>
        </div>
      </section>
    </div>
  </div>



</body></html>
