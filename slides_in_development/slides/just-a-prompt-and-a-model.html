<!DOCTYPE html><html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="slide-id" content="just-a-prompt-and-a-model">
  <title id="just-a-prompt-and-a-model.title_tag">Demo 1 - just a prompt and a model</title>
  <base href="../">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="styles.css" rel="stylesheet">
  <script defer="" src="slide-runtime.js"></script>
</head>
<body>
  <div class="deck-shell">
    <div class="deck-scale" id="deckScale">
      <section class="slide grain active" data-slide-id="just-a-prompt-and-a-model">
        <div class="absolute inset-0 px-[96px] py-[92px] flex flex-col justify-start">
          <div class="note topbar">
            <span data-bind="text:topbar_left" id="just-a-prompt-and-a-model.topbar_left"></span>
            <span data-bind="text:topbar_center" id="just-a-prompt-and-a-model.topbar_center"></span>
            <span id="just-a-prompt-and-a-model.slide_counter">№<span data-bind="magic:slide_number" id="just-a-prompt-and-a-model.slide_number"></span> / <span data-bind="magic:slide_count" id="just-a-prompt-and-a-model.slide_count"></span></span>
          </div>
          <div class="h-[22px]"></div>
          <h1 class="h-lg max-w-[1700px]" id="just-a-prompt-and-a-model.title" data-bind="html:title"></h1>
          <div class="grid grid-cols-[0.92fr_1.08fr] gap-8 mt-10 mb-[140px] items-start">
            <div class="panel rounded-[28px] p-10 relative overflow-hidden min-h-[560px]" id="just-a-prompt-and-a-model.left_panel">
              <div class="eyebrow mb-6" id="just-a-prompt-and-a-model.left_label" data-bind="text:left_label"></div>
              <ul class="bullet-lg space-y-6 max-w-[90%]">
                <li id="just-a-prompt-and-a-model.bullet_1" data-bind="html:bullet_1"></li>
                <li id="just-a-prompt-and-a-model.bullet_2" data-bind="html:bullet_2"></li>
              </ul>
              <img class="absolute right-8 bottom-8 w-[500px] opacity-35" id="just-a-prompt-and-a-model.easy_stamp" src="assets/easy-stamp.png" alt="Easy stamp">
            </div>
            <div class="panel rounded-[28px] p-10 min-h-[560px]" id="just-a-prompt-and-a-model.right_panel">
              <div class="eyebrow mb-6" id="just-a-prompt-and-a-model.right_label" data-bind="text:right_label"></div>
              <div class="body-md mono" id="just-a-prompt-and-a-model.artifact_1" data-bind="html:artifact_1"></div>
              <div class="eyebrow mt-8 mb-3" id="just-a-prompt-and-a-model.command_label" data-bind="text:command_label"></div>
              <div class="code panel rounded-[20px] p-6" id="just-a-prompt-and-a-model.command" data-bind="text:command"></div>
              <div class="eyebrow mt-8 mb-3" id="just-a-prompt-and-a-model.prompt_label" data-bind="text:prompt_label"></div>
              <div class="body-lg" id="just-a-prompt-and-a-model.prompt" data-bind="html:prompt"></div>
            </div>
          </div>
          <div class="footer-note" data-bind="text:footnote" id="just-a-prompt-and-a-model.footnote"></div>
        </div>
      </section>
    </div>
  </div>



</body></html>
